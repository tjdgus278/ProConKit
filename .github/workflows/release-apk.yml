name: Build and publish APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-apk:
    name: Build installable debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Name APK
        shell: bash
        run: cp app/build/outputs/apk/debug/app-debug.apk "ProConKit-${GITHUB_REF_NAME}.apk"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProConKit-${{ github.ref_name }}
          path: ProConKit-${{ github.ref_name }}.apk
          if-no-files-found: error

      - name: Create GitHub prerelease
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          "ProConKit-${GITHUB_REF_NAME}.apk"
          --repo "${GITHUB_REPOSITORY}"
          --title "ProConKit ${GITHUB_REF_NAME}"
          --notes "Early installable development build. This APK uses Android debug signing and is intended for testing the controller status and home-screen widget MVP."
          --prerelease
